name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-frontend:
    name: Build Angular frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            public/browser/
            public/index.php
          retention-days: 1

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: build-frontend
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, curl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP files
        run: find src public router.php tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: build-frontend
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start application
        run: |
          php -S 127.0.0.1:8080 -t public router.php > /tmp/bookshop.log 2>&1 &
          echo $! > /tmp/bookshop.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/health > /dev/null; then
              echo "Application is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "Application failed to start"
          cat /tmp/bookshop.log || true
          exit 1

      - name: Run smoke tests
        run: bash scripts/ci-smoke.sh

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-server-log
          path: /tmp/bookshop.log
          retention-days: 7

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/bookshop.pid ]; then
            kill "$(cat /tmp/bookshop.pid)" || true
          fi

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build-frontend
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/e2e/package.json

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: tests/e2e
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14
